# CIPHER Configuration — IEEE TIFS Submission
# System: CIPHER (Certified Insider-threat detection via
#          Privacy-preserving Hierarchical fEderated behavioral leaRning)
#
# NOTE: This is the TIFS paper config.

# ─── Dataset ───────────────────────────────────────────────────────────────
dataset:
  primary: cert_r4.2          # Headline results
  secondary:
    - cert_r6.2               # Cross-dataset validation (4000 users)
    - cert_r5.2               # Cross-dataset validation (700 users)
  excluded: [D2_corporate, D3_classified]  # Removed — invalid synthetic envs

# ─── BDM (Behavioral Drift Monitor) ────────────────────────────────────────
# Paper: Section III-B, Algorithm 1, Eq.(2)

bdm:
  tau_drift: 0.25             # KL-divergence threshold (grid-searched)
  alpha_smooth: 0.10          # Exponential smoothing factor
  epsilon_smooth: 1.0e-12     # Prevents log(0) in KL computation
  window_days: 30             # Sliding window size
  n_bins: 20                  # Histogram bins for distribution summary

# ─── PSE (Persona-Stratified Ensemble) ─────────────────────────────────────
# Paper: Section III-C, Algorithm 2, Eq.(3)

pse:
  theta_threat: 0.50          # Threat score threshold
  n_estimators: 200           # Trees for RF/XGBoost/LightGBM
  mlp_layers: [128, 64]       # MLP hidden layer widths
  mlp_dropout: 0.30           # Dropout rate
  mlp_activation: relu
  n_archetypes: 4             # CERT silos: HR, IT, Finance, Operations

# ─── DPFA (Differentially Private Federated Aggregation) ────────────────────
# Paper: Section III-D, Algorithms 3-4, Eqs.(4)(5)(6)

dpfa:
  sigma: 1.28                 # Noise scale → epsilon=1.2830 at operating point
  C: 1.0                      # Gradient clipping norm
  rounds: 10                  # Federation rounds (R)
  local_epochs: 5             # Local epochs per round (E)
  q: 0.10                     # Poisson subsampling rate
  alpha_rdp: 10               # Rényi order for privacy accounting
  delta: 1.0e-5               # Target delta
  epsilon_actual: 1.2830      # Verified via compute_epsilon(sigma=1.28, R=10, q=0.10)
  byzantine_f: 1              # Max Byzantine clients tolerated by Multi-Krum

# ─── Privacy accounting verification ───────────────────────────────────────
# Theorem 1 derivation:
#   epsilon_alpha = q^2 * alpha / (2 * sigma^2)
#               = 0.01 * 10 / (2 * 1.6384)
#               = 0.003050
#   epsilon_total = R * epsilon_alpha = 10 * 0.003050 = 0.03050
#   epsilon(delta) = 0.03050 + ln(1e5)/9 = 0.03050 + 1.2792 = 1.2830 ✓
privacy:
  epsilon: 1.2830
  delta: 1.0e-5
  mia_auc_no_dp: 0.7834       # E8: attacker succeeds without DP
  mia_auc_cipher: 0.5024      # E8: DP suppresses to near-random

# ─── Evaluation ─────────────────────────────────────────────────────────────
eval:
  seed: 42
  cv_folds: 5
  primary_metric: AUC         # Use AUC not F1 for ablation argument
  secondary_metric: F1
